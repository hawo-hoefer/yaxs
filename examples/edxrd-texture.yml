kind: !EnergyDispersive
    n_steps: 1024
    # energy_range_kev: [10, 160]
    energy_range_kev: [20, 50]
    theta_deg: 3.965
    beamline:
      storage_ring_electron_energy_gev: 6
      storage_ring_current_a: 0.1
      n_wiggler_magnets: 10
      distance_from_device_m: 100

sample_parameters:
  structure_permutations: 4
  composition_kind: ByVolume
  structures:
    - path: ./cif/Ir_53813.cif
      domain_size: 50.0
      ds_eta: 0.5
      preferred_orientation: !DirectBingham
        k: [1000, 0.5, 0.5]
        orientation: [1, 0, 0, 0]
        sampling: {n: 1024, kappa: 20}
      composition: 0.5
    - path: ./cif/HfO2_monoclinic_27313.cif
      domain_size: 50.0
      ds_eta: 0.5

simulation_parameters:
  normalize: false
  seed: 1234
  n_patterns: 2
  abstol: 1e-2
  texture_measurement:
    chi:
      range: [0, 20]
      steps: 2
    phi:
      range: [-20, 200]
      steps: 2


